<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Material Stock Viewer</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .upload-container { margin-bottom: 20px; text-align: center; }
        .search-container { margin-bottom: 20px; }
        table { background-color: white; }
        .btn { margin: 0 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Material Stock Data Viewer</h1>
        <div class="upload-container">
            <label for="fileInput" class="btn btn-success">Upload Excel File (.xlsx or .xls)</label>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
            <button class="btn btn-danger" id="clearBtn">Clear Stored Data</button>
        </div>
        <div class="search-container">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Search (e.g., Material No or Bin)">
            </div>
        </div>
        <table class="table table-striped table-bordered" id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="pagination" class="d-flex justify-content-center">
            <button class="btn btn-primary" id="prevBtn">Previous</button>
            <span id="pageInfo" class="mx-3 align-self-center"></span>
            <button class="btn btn-primary" id="nextBtn">Next</button>
        </div>
    </div>
    <script src="bootstrap.min.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
